<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar - Premium Tech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/js/interactions.js" defer></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand">Stellar<span class="dot">.</span></a>
            <div class="nav-links">
                <a href="/">Shop</a>
                <a href="/cart" class="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" th:text="${session.cart != null ? session.cart.itemCount : 0}">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1>Elevate Your Setup</h1>
            <p>Discover premium tech gear curated for the ultimate experience.</p>
        </div>
    </header>

    <!-- Products Section -->
    <main class="container page-layout">
        <aside class="sidebar">
            <form action="/" method="get" class="search-form">
                <input type="text" name="search" class="form-control" placeholder="Search products..." th:value="${currentSearch}">
                <input th:if="${currentCategoryId != null}" type="hidden" name="categoryId" th:value="${currentCategoryId}">
                <button type="submit" class="btn btn-add" style="margin-top: 0.5rem; padding: 0.5rem;"><i class="fas fa-search"></i> Search</button>
            </form>

            <h3 class="sidebar-title">Categories</h3>
            <ul class="category-list">
                <li><a href="/" th:classappend="${currentCategoryId == null} ? 'active' : ''">All Products</a></li>
                <li th:each="cat : ${categories}">
                    <a th:href="@{/(categoryId=${cat.id}, search=${currentSearch})}"
                       th:text="${cat.name}"
                       th:classappend="${currentCategoryId == cat.id} ? 'active' : ''">Category</a>
                </li>
            </ul>
        </aside>

        <section class="products-area">
            <div class="section-title">
                <h2>Featured Products</h2>
            </div>
            
            <div th:if="${products.empty}" style="margin-top:2rem;">
                <p style="color: var(--text-secondary);">No products found matching your criteria.</p>
            </div>

            <div class="product-grid" th:if="${!products.empty}">
                <div class="product-card" th:each="product : ${products}">
                    <div class="card-image">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}">
                        <div class="hover-overlay">
                            <button type="button" class="btn btn-add" th:onclick="'addToCart(' + ${product.id} + '); return false;'"><i class="fas fa-plus"></i> Add to Cart</button>
                        </div>
                    </div>
                <div class="card-info">
                    <h3 th:text="${product.name}">Product Name</h3>
                    <p class="description" th:text="${product.description}">Product description goes here.</p>
                    <div class="price-row">
                        <span class="price" th:text="'$' + ${product.price}">$0.00</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Stellar. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
