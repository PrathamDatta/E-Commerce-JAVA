<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Stellar</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand">Stellar<span class="dot">.</span></a>
            <div class="nav-links">
                <a href="/">Shop</a>
                <a href="/cart" class="cart-link">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" th:text="${session.cart != null ? session.cart.itemCount : 0}">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Cart Content -->
    <main class="container" style="margin-top: 100px; min-height: 60vh;">
        <div class="section-title">
            <h2>Your Cart</h2>
        </div>
        
        <div th:if="${cart == null || cart.items.empty}">
            <p style="color: var(--text-secondary); font-size: 1.125rem;">Your cart is currently empty.</p>
            <a href="/" class="btn btn-add" style="display: inline-block; width: auto; margin-top: 1rem;">Continue Shopping</a>
        </div>
        
        <div th:if="${cart != null && !cart.items.empty}" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <!-- Cart Items -->
            <div style="background: var(--surface-color); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color);">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td>
                                <div class="cart-item-info">
                                    <img th:src="${item.product.imageUrl}" class="cart-item-img" th:alt="${item.product.name}">
                                    <span style="font-weight: 500;" th:text="${item.product.name}">Product Name</span>
                                </div>
                            </td>
                            <td th:text="'$' + ${item.product.price}">$0.00</td>
                            <td th:text="${item.quantity}">1</td>
                            <td style="font-weight: 600; color: var(--text-primary);" th:text="'$' + ${item.subtotal}">$0.00</td>
                            <td>
                                <form th:action="@{/cart/remove}" method="post">
                                    <input type="hidden" name="productId" th:value="${item.product.id}">
                                    <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Order Summary -->
            <div class="cart-summary">
                <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
                <div class="summary-row">
                    <span style="color: var(--text-secondary);">Subtotal</span>
                    <span th:text="'$' + ${cart.total}">$0.00</span>
                </div>
                <div class="summary-row">
                    <span style="color: var(--text-secondary);">Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span th:text="'$' + ${cart.total}">$0.00</span>
                </div>
                <a href="/checkout" class="btn btn-checkout">Proceed to Checkout</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Stellar. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
