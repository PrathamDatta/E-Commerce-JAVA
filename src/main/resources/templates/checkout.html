<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Stellar</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand">Stellar<span class="dot">.</span></a>
        </div>
    </nav>

    <main class="container" style="margin-top: 100px; max-width: 800px;">
        <div class="section-title">
            <h2>Checkout</h2>
        </div>
        
        <div style="background: var(--surface-color); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color);">
            <form id="checkoutForm" onsubmit="handleCheckout(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="customerName" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="customerEmail" class="form-control" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" name="shippingAddress" class="form-control" required placeholder="123 Main St">
                </div>
                
                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>ZIP Code</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <label>Credit Card Number</label>
                    <input type="text" class="form-control" required placeholder="**** **** **** ****">
                </div>

                <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                    <div style="display: flex; justify-content: space-between; font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">
                        <span>Total to Pay:</span>
                        <span th:text="'$' + ${cart.total}">$0.00</span>
                    </div>
                    <button type="submit" id="proceedBtn" class="btn btn-add" style="width: 100%; font-size: 1.125rem;">Place Order</button>
                </div>
            </form>
        </div>
    <script>
        function handleCheckout(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new URLSearchParams(new FormData(form));

            const btn = document.getElementById('proceedBtn');
            btn.innerText = 'Processing...';

            fetch('/checkout/ajax', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            })
            .then(r => r.text())
            .then(text => {
                btn.innerText = 'Purchase Successful! 🎉';
                btn.style.backgroundColor = '#10b981'; // Success Green
                btn.disabled = true;
                
                // Clear cart
                const cartCount = document.querySelector('.cart-count');
                if (cartCount) cartCount.innerText = '0';
            })
            .catch(err => {
                btn.innerText = 'Error trying again';
                btn.style.backgroundColor = '#ef4444';
            });
        }
    </script>
</body>
</html>
